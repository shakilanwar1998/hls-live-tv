<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>World Cup Live - Shakil Anwar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📺</text></svg>" />
</head>
<body>
  <!-- Full-bleed player: the video fills the whole viewport. All chrome
       (controls, badges) auto-hides so at rest it's just the video. -->
  <div class="player" id="player">
    <video id="video" playsinline></video>

    <!-- Top bar: channel browser toggle + current channel name (fades with chrome) -->
    <div class="topbar" id="topbar">
      <button class="ctrl channels-toggle" id="channelsToggle" type="button" title="Channels">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
        <span>Channels</span>
      </button>
      <span class="now-playing" id="nowPlaying"></span>
    </div>

    <!-- Channel browser panel (slides in from the left) -->
    <aside class="channel-panel" id="channelPanel" hidden>
      <div class="cp-head">
        <input type="search" id="channelSearch" placeholder="Search channels…" autocomplete="off" />
        <button class="cp-close" id="channelClose" type="button" title="Close" aria-label="Close">✕</button>
      </div>
      <div class="cp-count" id="channelCount"></div>
      <div class="cp-list" id="channelList"></div>
    </aside>

    <!-- Unmute / play prompt (autoplay starts muted). Adapts via .is-play. -->
    <button class="unmute-btn" id="playOverlay" type="button" hidden aria-label="Unmute">
      <svg class="ub-icon ub-sound" viewBox="0 0 24 24" aria-hidden="true"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      <svg class="ub-icon ub-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      <span class="ub-label">Tap to unmute</span>
    </button>

    <!-- Status badges (fade with the controls) -->
    <div class="badges">
      <span class="badge live" id="liveBadge" hidden>● LIVE</span>
      <span class="badge behind" id="behindBadge" hidden></span>
    </div>

    <!-- Non-blocking reconnect indicator (stays visible while recovering) -->
    <span class="reconnect-badge" id="reconnectBadge" hidden>↻ Reconnecting…</span>

    <!-- Loading spinner -->
    <div class="spinner" id="spinner" hidden></div>

    <!-- Blocking error panel — only shown when playback is genuinely dead -->
    <div class="error-panel" id="errorPanel" hidden>
      <div class="error-icon">⚠️</div>
      <div class="error-msg" id="errorMsg"></div>
      <button id="retryBtn">Retry</button>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls">
      <button class="ctrl" id="playPause" title="Play/Pause (k)">
        <svg class="i-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="i-pause" viewBox="0 0 24 24" hidden><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>

      <div class="volume">
        <button class="ctrl" id="muteBtn" title="Mute (m)">
          <svg class="i-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
          <svg class="i-mute" viewBox="0 0 24 24" hidden><path d="M3 9v6h4l5 5V4L7 9H3zm16.5 3l2.5-2.5-1.4-1.4L18 11.6l-2.6-2.5L14 10.5l2.5 2.5L14 15.5l1.4 1.4 2.6-2.5 2.6 2.5 1.4-1.4z"/></svg>
        </button>
        <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" title="Volume" />
      </div>

      <button class="ctrl live-btn" id="goLiveBtn" title="Jump to live edge">GO LIVE</button>

      <span class="spacer"></span>

      <button class="ctrl" id="statsBtn" title="Toggle stats (i)">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      </button>
      <button class="ctrl" id="pipBtn" title="Picture-in-picture">
        <svg viewBox="0 0 24 24"><path d="M19 7h-8v6h8V7zm2-4H3a2 2 0 00-2 2v14a2 2 0 002 2h18a2 2 0 002-2V5a2 2 0 00-2-2zm0 16H3V5h18v14z"/></svg>
      </button>
      <button class="ctrl" id="fsBtn" title="Fullscreen (f)">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>

    <!-- Stats overlay -->
    <div class="stats" id="stats" hidden></div>
  </div>

  <script src="hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
